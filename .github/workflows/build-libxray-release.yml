name: Build libxray release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: libxray-latest
      xray_version:
        description: Xray-core git tag/branch/commit
        required: true
        default: v1.8.24
  push:
    tags:
      - 'libxray-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "xray_version=${{ inputs.xray_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "xray_version=${GITHUB_REF_NAME#libxray-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        run: docker build --build-arg XRAY_VERSION='${{ steps.vars.outputs.xray_version }}' -t bobrsocks-libxray-build .

      - name: Extract artifacts
        run: |
          mkdir -p dist
          docker run --rm -v "$PWD/dist:/host-out" bobrsocks-libxray-build sh -lc 'cp -r /out/* /host-out/'
          cd dist/arm64-v8a
          zip -9 ../libxray-android-arm64-v8a.zip libxray.so libxray.h libxray.so.sha256

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
          XRAY_VERSION: ${{ steps.vars.outputs.xray_version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/arm64-v8a/libxray.so \
              dist/arm64-v8a/libxray.h \
              dist/arm64-v8a/libxray.so.sha256 \
              dist/libxray-android-arm64-v8a.zip \
              --clobber
          else
            gh release create "$TAG" \
              dist/arm64-v8a/libxray.so \
              dist/arm64-v8a/libxray.h \
              dist/arm64-v8a/libxray.so.sha256 \
              dist/libxray-android-arm64-v8a.zip \
              --title "libxray ${XRAY_VERSION}" \
              --notes "Built from XTLS/Xray-core ${XRAY_VERSION}."
          fi
